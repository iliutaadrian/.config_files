set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"

# remap prefix from 'C-b' to 'C-s'
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# split panes using | and -
bind | split-window -h   #@ Split pane right (vertical divider)
bind - split-window -v   #@ Split pane down (horizontal divider)
unbind '"'
unbind %

set -s escape-time 0
set -g focus-events on

# scrollback history
set -g history-limit 10000

# reload config file (change file location to your the tmux.conf you want to use)
unbind r
bind r source-file ~/.tmux.conf   #@ Reload tmux config

bind -r j resize-pane -D 6
bind -r k resize-pane -U 7
bind -r l resize-pane -R 7
bind -r h resize-pane -L 7

bind -r m resize-pane -Z

# Move window left/right
bind -r Left swap-window -t -1\; select-window -t -1   #@ Move window left
bind -r Right swap-window -t +1\; select-window -t +1   #@ Move window right

# Auto-resize: focused pane gets more space (AI=50%, editor=65%, terminal=35%)
set-hook -g pane-focus-in 'run-shell "$HOME/config/scripts/tmux-focus-resize.sh #{pane_id} #{pane_left} #{pane_width} #{window_width}"'

# Enable mouse
set -g mouse on
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear pbcopy

set-window-option -g mode-keys vi
set-option -g xterm-keys on

#numbers should start at 1
set -g base-index 1
set -g pane-base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
bind-key s choose-tree -ZsK '#{?#{e|<:#{line},9},#{e|+:1,#{line}},#{?#{e|<:#{line},35},M-#{a:#{e|+:97,#{e|-:#{line},9}}},}}' -O name   #@ Session / window tree picker

# copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# set path directory to current pane 
bind v attach-session -c "#{pane_current_path}"   #@ Set session default dir to current pane

# bind-key l run-shell 'tmux split-window -v -l 50 -c "#{pane_current_path}" "lazygit"'
bind-key b run-shell 'tmux neww "cd #{pane_current_path}; btop"'   #@ Open btop (system monitor)
bind-key y run-shell 'tmux neww "cd #{pane_current_path}; yazi"'   #@ Open yazi (file manager)
bind-key g run-shell 'tmux neww "cd #{pane_current_path}; lazygit"'   #@ Open lazygit
bind-key t respawn-pane -k -c "#{pane_current_path}" \; send-keys "cx" Enter   #@ Fresh current pane here, then run nic layout
bind-key T respawn-window -k -c "#{pane_current_path}"   #@ Fresh shell here, keep tab number

# Cheatsheet of every custom shortcut (tmux binds, zsh aliases & functions)
bind-key ? display-popup -w 80% -h 80% -E "$HOME/config/scripts/cheatsheet.sh"   #@ Show this shortcuts cheatsheet

# Quick session switching (prefix + Shift+letter)
bind-key G switch-client -t golfgenius   #@ Go to golfgenius session
bind-key L switch-client -t lifeos   #@ Go to lifeos session
bind-key S switch-client -t sites   #@ Go to sites session
bind-key C switch-client -t config   #@ Go to config session
bind-key H switch-client -t homelab   #@ Go to homelab session
bind-key E switch-client -t email   #@ Go to email session
bind-key F switch-client -t focus   #@ Go to focus session

# Ensure sessions exist on server start / config reload
if-shell '! tmux has-session -t golfgenius 2>/dev/null' 'new-session -d -s golfgenius -c ~/Sites/golfgenius'
if-shell '! tmux has-session -t lifeos 2>/dev/null'     'new-session -d -s lifeos -c ~/Documents/lifeos'
if-shell '! tmux has-session -t sites 2>/dev/null'      'new-session -d -s sites -c ~/sites'
if-shell '! tmux has-session -t config 2>/dev/null'     'new-session -d -s config -c ~/config'
if-shell '! tmux has-session -t homelab 2>/dev/null'    'new-session -d -s homelab -c ~'
if-shell '! tmux has-session -t email 2>/dev/null'      'new-session -d -s email -c ~'
if-shell '! tmux has-session -t focus 2>/dev/null'      'new-session -d -s focus -c ~'

#@ Toggle nic auto-resize on/off
bind-key N if-shell '[ "$(tmux show-option -gqv @nic-resize)" = "off" ]' \
  'set -g @nic-resize on; display "nic resize: ON"' \
  'set -g @nic-resize off; display "nic resize: OFF"'


# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 12

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 17 minutes
# set -g @plugin 'iliutaadrian/commit-ch-tmux'

set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'jimeh/tmux-themepack'

# open url in browser
#@ Pick a URL from the pane and open it
bind-key C-u run-shell -b "tmux capture-pane -J -p | grep -oE '(https?):\/\/.*[^>]' | fzf-tmux -d20 --multi --bind alt-a:select-all,alt-d:deselect-all | xargs open"

# themes
set -g @themepack 'powerline/default/cyan'

set -g status-right ''
set -g status-right-length 0

set -g @resurrect-capture-pane-contents 'on'
# Restore only nvim and claude/cx on resurrect (overrides default whitelist).
# '~' = match anywhere in the command line and restore it with its arguments.
set -g @resurrect-processes '"~nvim->nvim" "~claude" "~cx"'
set -g @continuum-restore 'on'

set -g allow-passthrough on

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

run '~/.tmux/plugins/tpm/tpm'

# Override theme's right status after TPM loads
set -g status-right ''
set -g status-right-length 0
