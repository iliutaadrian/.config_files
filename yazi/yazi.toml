# Yazi configuration
# Docs: https://yazi-rs.github.io/docs/configuration/yazi

[mgr]
ratio = [1, 4, 3]
linemode = "mtime"
sort_by = "mtime"
sort_sensitive = false
sort_reverse = true
sort_dir_first = false
show_hidden = true
show_symlink = true

[preview]
max_width = 1000
max_height = 1000
image_filter = "triangle"
image_quality = 75

[opener]
open = [
  { run = 'open "$@"', desc = "Open", for = "macos" },
]
reveal = [
  { run = 'open -R "$@"', desc = "Reveal in Finder", for = "macos" },
]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
rules = [
  { url = "*/", use = ["edit", "open", "reveal"] },
  { mime = "text/*", use = ["edit", "reveal"] },
  { mime = "image/*", use = ["open", "reveal"] },
  { mime = "video/*", use = ["open", "reveal"] },
  { mime = "audio/*", use = ["open", "reveal"] },
  { mime = "application/pdf", use = ["open", "reveal"] },
  { mime = "application/json", use = ["edit", "reveal"] },
  { mime = "*/javascript", use = ["edit", "reveal"] },
  { url = "*", use = ["open", "edit", "reveal"] },
]

# Git status marks (yazi-rs/plugins:git)
[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
